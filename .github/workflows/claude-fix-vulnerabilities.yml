name: Fix Vulnerabilities

on:
  workflow_dispatch:
    inputs:
      severity:
        description: "Minimum severity to fix"
        required: true
        default: "high"
        type: choice
        options:
          - critical
          - high
          - moderate
          - low
      dry_run:
        description: "Dry run (report only, no changes)"
        required: false
        default: false
        type: boolean
  issues:
    types: [labeled]

jobs:
  fix-vulnerabilities:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && github.event.label.name == 'claude-security-fix')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-fix-vulnerabilities
      cancel-in-progress: true
    permissions:
      contents: write
      issues: write
      pull-requests: write
      security-events: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fix Dependabot Vulnerabilities
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are a Dafiti engineering assistant fixing security vulnerabilities.

            ## Configuration
            - Minimum severity: ${{ github.event.inputs.severity || 'high' }}
            - Dry run: ${{ github.event.inputs.dry_run || 'false' }}

            ## Steps

            1. Fetch open Dependabot alerts:
               `gh api repos/${{ github.repository }}/dependabot/alerts?state=open --paginate`

            2. Filter alerts by minimum severity (critical > high > moderate > low).
               Only process alerts at or above the configured minimum severity.

            3. Group alerts by package name and ecosystem (npm/pip).

            4. For each group, attempt to fix:
               - **npm direct deps**: bump version in package.json to patched version
               - **npm transitive deps**: run `npm audit fix` or add `overrides` in package.json
               - **pip direct deps**: bump version in requirements.txt or pyproject.toml
               - **pip transitive deps**: pin fixed version in constraints
               - **No fix available**: mark as "requires manual attention"

            5. Regenerate lock files (`npm install` for npm).

            6. Run tests (`npm test` or `pytest`) to verify nothing broke.

            7. If dry_run is true:
               - Output the summary table but do NOT commit or create a PR
               - Comment the report on the issue (if triggered by label)

            8. If dry_run is false:
               - Create branch `fix/dependabot-vulnerabilities`
               - Commit with message `fix(deps): resolve N security vulnerabilities`
               - Include CVE list in commit body
               - Create a PR with summary table

            ## Rules
            - Never downgrade dependencies
            - Never use `npm audit fix --force`
            - Preserve version range operators (^, ~, >=)
            - Group all fixes in a single commit
            - Follow conventions in .claude/rules/

            ## Output
            Always output a markdown table:
            | Package | CVE | Severity | Status |
            |---------|-----|----------|--------|
