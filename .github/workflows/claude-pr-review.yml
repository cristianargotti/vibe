name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-6"
          prompt: |
            Review this PR following the guidelines in REVIEW.md.
            Check against all rules in .claude/rules/.
            Focus on: security, correctness, architecture, then quality.
            Be specific with file paths and line numbers.
            Group findings by severity: Must Fix, Should Fix, Consider, Praise.
