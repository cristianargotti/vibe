version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["chore", "dependencies"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      eslint:
        patterns: ["eslint*", "@eslint/*", "@typescript-eslint/*"]
      formatting:
        patterns: ["prettier*"]

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["chore", "dependencies"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      starlight:
        patterns: ["astro*", "@astrojs/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["chore", "ci"]
    commit-message:
      prefix: "ci(deps)"
